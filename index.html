
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Lista de Contactos</title>
</head>
<body>
    <div id="spinner" class="spinner hidden"></div>
    
    <img src="https://th.bing.com/th/id/OIP.hzeZBtXjQ4NiQqP98gZtyAHaHa?w=209&h=209&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3" width="100" height="100" alt="Imagen Contactos">
    <h1>Lista de Contactos</h1>
    
    <div class="form-container">
        <form id="formulario">
            <input type="text" id="contactName" placeholder="Nombre del contacto">
            <input type="text" id="contactLastName" placeholder="Apellido del contacto">
            <input type="number" id="contactPhone" placeholder="Número de teléfono">
            <input type="text" id="contactCity" placeholder="Ciudad">
            <input type="text" id="contactAddress" placeholder="Dirección">
            <div class="gender-container">
                <label><input type="checkbox" id="genderMale" onchange="handleGenderChange('masculino')"> Masculino</label>
                <label><input type="checkbox" id="genderFemale" onchange="handleGenderChange('femenino')"> Femenino</label>
            </div>
            <button type="submit" id="addContactButton">Agregar Contacto</button>
        </form>
    </div>
    
    <div id="contactList" class="contact-list"></div>
    
    <script src="main-api.js"></script>
</body>
</html>
